server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: "${AUTH_SERVICE_URL:http://auth-service:8081}"
          predicates:
            - Path=/api/auth/**
          filters:
            - StripPrefix=0

        - id: drug-catalog-service
          uri: "${DRUG_CATALOG_URL:http://drug-catalog-service:8082}"
          predicates:
            - Path=/api/drugs/**
          filters:
            - AuthFilter
            - RewritePath=/api/drugs(?<segment>/?.*), /api/drug/catalog${segment}

        - id: notification-service
          uri: "${NOTIFICATION_URL:http://notification-service:3000}"
          predicates:
            - Path=/api/notifications/**
          filters:
            - AuthFilter

      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods: ["GET","POST","PUT","DELETE","OPTIONS"]
            allowedHeaders: "*"

auth:
  service:
    url: "${AUTH_SERVICE_URL:http://auth-service:8081}"

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  metrics:
    export:
      prometheus:
        enabled: true
